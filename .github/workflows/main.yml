name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ejercicio   

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descargar código fuente
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3. Ejecutar pruebas automatizadas (ruta corregida)
      - name: Ejecutar pruebas con pytest
        run: pytest ejercicio3.0.0/ -v

      # 4. (Opcional) Mostrar que la app funciona – ejecutar app real
      - name: Ejecutar aplicación (demostración)
        run: python ejercicio3.0.0/app.py

      # 5. Autenticarse en GitHub Container Registry
      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Construir imagen Docker (usa el Dockerfile en la raíz)
      - name: Construir imagen Docker
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:3.0.0 .

      # 7. Publicar imagen en GHCR
      - name: Publicar imagen
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:3.0.0