name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ejercicio   # imagen: ejercicio:3.0.0

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descargar código fuente
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3. Ejecutar pruebas automatizadas
      - name: Ejecutar pruebas con pytest
        run: pytest --tb=short

      # 4. Ejecutar la aplicación (simulación rápida)
      - name: Ejecutar aplicación
        run: python main.py

      # 5. Simular fase de despliegue
      - name: Simular despliegue
        run: echo "Despliegue simulado completado exitosamente"

      # 6. Autenticarse en GitHub Container Registry
      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. Construir imagen Docker
      - name: Construir imagen Docker
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:3.0.0 .

      # 8. Publicar imagen en GHCR
      - name: Publicar imagen
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:3.0.0